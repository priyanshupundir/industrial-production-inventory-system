version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: industrial_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: industrial_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d industrial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: industrial_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/industrial_db?schema=public
      - JWT_SECRET=supersecretjwtkey_industrial_2026
      - CLIENT_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: industrial_client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
